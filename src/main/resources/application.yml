server:
  port: 8080
  servlet:
    context-path: /api

spring:
  application:
    name: blogserver
  profiles:
    active: dev

  # ============ 文件上传大小限制 ============
  servlet:
    multipart:
      max-file-size: 5MB
      max-request-size: 20MB

  # ============ 数据源（本地 MySQL，账号/密码 root/123456）============
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://127.0.0.1:3306/blog?createDatabaseIfNotExist=true&useUnicode=true&characterEncoding=utf-8&serverTimezone=Asia/Shanghai&useSSL=false&allowPublicKeyRetrieval=true&allowMultiQueries=true
    username: root
    password: "123456"
    hikari:
      pool-name: BlogHikariPool
      minimum-idle: 5
      maximum-pool-size: 20
      connection-timeout: 30000
      max-lifetime: 1800000

  # ============ 启动自动建表/初始化数据 ============
  sql:
    init:
      mode: always
      schema-locations: classpath:db/schema.sql
      data-locations: classpath:db/data.sql
      encoding: UTF-8
      continue-on-error: true

  # ============ 邮件 SMTP（请替换为真实邮箱授权码）============
  mail:
    host: smtp.qq.com
    port: 465
    username: xxx@qq.com          # TODO: 替换为发件邮箱
    password: xxx   # TODO: 替换为 SMTP 授权码（非登录密码）
    protocol: smtps
    default-encoding: UTF-8
    properties:
      mail:
        smtp:
          auth: true
          ssl:
            enable: true
          socketFactory:
            class: javax.net.ssl.SSLSocketFactory
        debug: false

# ============ MyBatis-Plus ============
mybatis-plus:
  mapper-locations: classpath*:/mapper/**/*.xml
  type-aliases-package: com.example.blogserver.entity
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
  global-config:
    banner: false
    db-config:
      id-type: auto
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0

# ============ Swagger / OpenAPI 中文文档 ============
springdoc:
  swagger-ui:
    path: /swagger-ui.html
    tags-sorter: alpha
    operations-sorter: alpha
    persist-authorization: true
  api-docs:
    path: /v3/api-docs
  default-produces-media-type: application/json
  group-configs:
    - group: 1-认证与公开接口
      paths-to-match: /auth/**, /public/**
    - group: 2-用户中心接口
      paths-to-match: /user/**, /comment/**
    - group: 3-后台管理接口
      paths-to-match: /admin/**

# ============ 业务自定义配置 ============
blog:
  jwt:
    # HS256 密钥（生产请改为环境变量，至少 32 字节）
    secret: blogServerJwtSecretKey_pleaseChangeInProduction_2026
    # 访问令牌有效期（毫秒）：2 小时
    expire: 7200000
    header: Authorization
    token-prefix: "Bearer "
  mail:
    from-name: 博客系统
    # 验证码有效期（分钟）
    code-expire-minutes: 5
  upload:
    # 本地存储根目录（相对项目运行目录）
    path: ./uploads
    # 访问前缀（与静态资源映射一致，最终地址为 context-path + 此前缀）
    url-prefix: /uploads
    max-size: 5242880
    allowed-ext: [ jpg, jpeg, png, gif, webp, bmp ]
  # 前端重置密码页地址（找回密码邮件中拼接 token）
  reset-password-url: http://localhost:5173/reset-password

# ============ 日志（清晰启动日志）============
logging:
  level:
    root: info
    com.example.blogserver: debug
    org.springframework.security: warn
  pattern:
    console: "%clr(%d{HH:mm:ss.SSS}){faint} %clr(%-5level) %clr([%thread]){magenta} %clr(%-40.40logger{39}){cyan} %clr(:){faint} %msg%n"
